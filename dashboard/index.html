<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="container">
  <div class="Sidebar">Sidebar</div>

  <div class="main">

    <header class="search">Search</header>

   
    <div class="boxContainer">
      <div class="box Jack">Congratulations Jack 🎉</div>
      <div class="box">Order</div>
      <div class="box">Sales</div>
      <div class="box">Expenses</div>
    </div>

   
    <div class="boxContainer1">
      <div class="box awesome">Awesome</div>
      <div class="box financesummary">Finance Summary</div>
    </div>

   
    <div class="tableWrap">
      <table>
        <tr>
          <th>Product</th>
          <th>Category</th>
          <th>Payment</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
        <tr>
          <td>OnePlus</td>
          <td>Mobile</td>
          <td>$499</td>
          <td>Confirmed</td>
          <td>⋮</td>
        </tr>
        <tr>
          <td>Magic Mouse</td>
          <td>Accessory</td>
          <td>$149</td>
          <td>Completed</td>
          <td>⋮</td>
        </tr>
      </table>
    </div>

  </div>
</div>

</body>
</html>
